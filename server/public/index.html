<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab Mapper</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-titles">
                <h1>Homelab Mapper</h1>
                <p>Real-time infrastructure and deployed app monitor</p>
            </div>
            <div class="header-actions">
                <button id="view-toggle-btn" class="btn secondary-btn">Diagram View</button>
                <button id="add-host-btn" class="btn primary-btn">+ Add Host</button>
            </div>
        </header>

        <main id="view-container">
            <div id="hosts-grid" class="grid">
                <!-- Hosts injected here by JS -->
                <div class="loader" id="main-loader">Loading...</div>
            </div>
            <div id="diagram-container" class="hidden glass" style="height: 600px; border-radius: 16px;">
                <!-- Vis.js network graph injected here -->
            </div>
        </main>
    </div>

    <!-- Modal for adding host -->
    <div id="add-host-modal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-btn" id="close-add-btn">&times;</span>
            <h2>Add New Host Agent</h2>
            <form id="add-host-form">
                <div class="form-group">
                    <label for="host-name">Host Name</label>
                    <input type="text" id="host-name" placeholder="e.g. Raspberry Pi 4" required>
                </div>
                <div class="form-group">
                    <label for="host-url">Agent URL</label>
                    <input type="url" id="host-url" placeholder="https://192.168.1.100:8443" required>
                </div>
                <div class="form-group">
                    <label for="host-token">API Token (Optional)</label>
                    <input type="password" id="host-token" placeholder="Your secret token">
                </div>
                <button type="submit" class="btn submit-btn">Connect Host</button>
            </form>
        </div>
    </div>

    <!-- Modal for container details -->
    <div id="container-detail-modal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-btn" id="close-detail-btn">&times;</span>
            <div id="container-detail-content">
                <!-- Data injected here -->
            </div>
        </div>
    </div>

    <script src="app.js?v=1.1"></script>
</body>

</html>
