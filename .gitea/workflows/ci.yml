name: CI Pipeline
run-name: Build and Test Homelab Mapper
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest
    #container: golang:1.26-bookworm
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Test Agent
        working-directory: ./agent
        run: go test -v ./...

      - name: Test Server
        working-directory: ./server
        run: go test -v ./...

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Login to Docker Registry
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login git.home.mhmdinan.com -u "${{ gitea.actor }}" --password-stdin

      - name: Build and Push Agent Image
        run: |
          docker build -t git.home.mhmdinan.com/${{ gitea.actor }}/homelab-mapper-agent:latest ./agent
          docker push git.home.mhmdinan.com/${{ gitea.actor }}/homelab-mapper-agent:latest

      - name: Build and Push Server Image
        run: |
          docker build -t git.home.mhmdinan.com/${{ gitea.actor }}/homelab-mapper-server:latest ./server
          docker push git.home.mhmdinan.com/${{ gitea.actor }}/homelab-mapper-server:latest
