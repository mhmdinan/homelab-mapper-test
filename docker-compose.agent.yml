version: '3.8'

services:
  agent:
    image: mhmdinan/homelab-mapper-agent:latest
    container_name: mapper_agent
    privileged: true
    ports:
      - "8443:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    environment:
      - PORT=8443
      - AUTH_TOKEN=token
