version: '3.8'

services:
  server:
    image: git.home.mhmdinan.com/muhammadinan/homelab-mapper-server:latest
    container_name: mapper_server
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_PATH=/data/data.db
